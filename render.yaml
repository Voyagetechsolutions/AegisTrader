services:
  - type: web
    name: aegis-trader-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./aegis_trader.db
      - key: APP_ENV
        value: production
      - key: TIMEZONE
        value: Africa/Johannesburg
      - key: PYTHON_VERSION
        value: 3.11
