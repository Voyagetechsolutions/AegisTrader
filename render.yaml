services:
  - type: web
    name: aegis-trader-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: TIMEZONE
        value: Africa/Johannesburg
      - key: PYTHON_VERSION
        value: "3.11"
