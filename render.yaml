services:
  - type: web
    name: aegis-trader-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: DASHBOARD_JWT_SECRET
        sync: false
      - key: MT5_NODE_URL
        sync: false
      - key: MT5_NODE_SECRET
        sync: false
      - key: TIMEZONE
        value: Africa/Johannesburg
      - key: MAX_DAILY_TRADES
        value: "2"
      - key: MAX_DAILY_LOSSES
        value: "2"
      - key: MAX_DAILY_DRAWDOWN_PCT
        value: "2.0"
      - key: MAX_SPREAD_POINTS
        value: "5"
      - key: MAX_SLIPPAGE_POINTS
        value: "10"
      - key: NEWS_FILTER_BYPASS
        value: "false"
    healthCheckPath: /health
