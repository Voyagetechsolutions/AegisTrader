<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aegis Trader Mobile</title>
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
        }
        .header {
            background: #1a1a1a;
            padding: 40px 16px 16px;
            text-align: center;
            border-bottom: 1px solid #333;
        }
        .header-title { font-size: 24px; font-weight: bold; }
        .header-subtitle { color: #00d4aa; font-size: 14px; margin-top: 4px; }
        .status-bar {
            display: flex;
            background: #1a1a1a;
            padding: 16px;
            justify-content: space-around;
        }
        .status-item { text-align: center; }
        .status-label { color: #666; font-size: 12px; }
        .status-value { color: #fff; font-size: 16px; font-weight: bold; margin-top: 4px; }
        .content { padding-bottom: 80px; }
        .card {
            background: #1a1a1a;
            margin: 16px;
            padding: 16px;
            border-radius: 12px;
        }
        .card-title { font-size: 18px; font-weight: bold; margin-bottom: 16px; }
        .mode-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }
        .mode-btn {
            background: #333;
            border: none;
            padding: 16px 8px;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .mode-btn.active { background: #00d4aa; }
        .mode-btn-icon { font-size: 24px; display: block; margin-bottom: 4px; }
        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .toggle {
            width: 50px;
            height: 30px;
            background: #333;
            border-radius: 15px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }
        .toggle.active { background: #00d4aa; }
        .toggle-slider {
            width: 26px;
            height: 26px;
            background: #fff;
            border-radius: 13px;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.2s;
        }
        .toggle.active .toggle-slider { transform: translateX(20px); }
        .risk-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }
        .risk-item { text-align: center; }
        .risk-value { color: #00d4aa; font-size: 20px; font-weight: bold; }
        .risk-label { color: #666; font-size: 12px; margin-top: 4px; }
        .balance-text {
            color: #00d4aa;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
        }
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            background: #1a1a1a;
            border-top: 1px solid #333;
            padding-bottom: 20px;
        }
        .tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            color: #666;
        }
        .tab.active { color: #00d4aa; }
        .tab-icon { font-size: 24px; }
        .tab-label { font-size: 10px; margin-top: 4px; }
        .loading { text-align: center; padding: 20px; color: #666; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">⚡ Aegis Trader</div>
        <div class="header-subtitle">US30</div>
    </div>

    <div class="status-bar">
        <div class="status-item">
            <div class="status-label">Mode</div>
            <div class="status-value" id="mode-val">—</div>
        </div>
        <div class="status-item">
            <div class="status-label">Session</div>
            <div class="status-value" id="session-val">—</div>
        </div>
        <div class="status-item">
            <div class="status-label">Trades</div>
            <div class="status-value" id="trades-val">0/2</div>
        </div>
    </div>

    <div class="content">
        <div class="card">
            <div class="card-title">Quick Controls</div>
            <div class="mode-grid">
                <button class="mode-btn" onclick="setMode('analyze')">
                    <span class="mode-btn-icon">🔍</span>
                    Analyze
                </button>
                <button class="mode-btn active" onclick="setMode('trade')">
                    <span class="mode-btn-icon">⚡</span>
                    Trade
                </button>
                <button class="mode-btn" onclick="setMode('swing')">
                    <span class="mode-btn-icon">📈</span>
                    Swing
                </button>
            </div>
            <div class="toggle-row">
                <span>Auto Trading</span>
                <div class="toggle active" onclick="toggleAuto()">
                    <div class="toggle-slider"></div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Risk Status</div>
            <div class="risk-grid">
                <div class="risk-item">
                    <div class="risk-value" id="risk-trades">0/2</div>
                    <div class="risk-label">Trades Today</div>
                </div>
                <div class="risk-item">
                    <div class="risk-value" id="risk-losses">0/2</div>
                    <div class="risk-label">Losses Today</div>
                </div>
                <div class="risk-item">
                    <div class="risk-value" id="risk-dd">0.00%</div>
                    <div class="risk-label">Drawdown</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Account</div>
            <div class="balance-text" id="balance">$0.00</div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab active">
            <div class="tab-icon">📊</div>
            <div class="tab-label">Overview</div>
        </div>
        <div class="tab">
            <div class="tab-icon">📈</div>
            <div class="tab-label">Signals</div>
        </div>
        <div class="tab">
            <div class="tab-icon">💰</div>
            <div class="tab-label">Trades</div>
        </div>
        <div class="tab">
            <div class="tab-icon">⚙️</div>
            <div class="tab-label">Settings</div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000'; // Change to your backend URL

        async function loadStatus() {
            try {
                const response = await fetch(`${API_URL}/dashboard/status`);
                const data = await response.json();
                
                document.getElementById('mode-val').textContent = data.mode?.toUpperCase() || '—';
                document.getElementById('session-val').textContent = data.session || '—';
                document.getElementById('trades-val').textContent = `${data.trades_today || 0}/2`;
                document.getElementById('risk-trades').textContent = `${data.trades_today || 0}/2`;
                document.getElementById('risk-losses').textContent = `${data.losses_today || 0}/2`;
                document.getElementById('risk-dd').textContent = `${(data.drawdown_pct || 0).toFixed(2)}%`;
                document.getElementById('balance').textContent = `$${(data.balance || 0).toFixed(2)}`;
                
                // Update mode buttons
                document.querySelectorAll('.mode-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
                const activeMode = data.mode || 'trade';
                document.querySelector(`[onclick="setMode('${activeMode}')"]`)?.classList.add('active');
                
                // Update toggle
                const toggle = document.querySelector('.toggle');
                if (data.auto_trade_enabled) {
                    toggle.classList.add('active');
                } else {
                    toggle.classList.remove('active');
                }
            } catch (error) {
                console.error('Failed to load status:', error);
            }
        }

        async function setMode(mode) {
            try {
                await fetch(`${API_URL}/dashboard/mode`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode })
                });
                await loadStatus();
            } catch (error) {
                console.error('Failed to set mode:', error);
            }
        }

        async function toggleAuto() {
            const toggle = event.target.closest('.toggle');
            const enabled = !toggle.classList.contains('active');
            
            try {
                await fetch(`${API_URL}/dashboard/auto-trade`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ enabled })
                });
                await loadStatus();
            } catch (error) {
                console.error('Failed to toggle auto trade:', error);
            }
        }

        // Load status on start and every 5 seconds
        loadStatus();
        setInterval(loadStatus, 5000);

        // Pull to refresh
        let startY = 0;
        document.addEventListener('touchstart', e => {
            startY = e.touches[0].pageY;
        });
        document.addEventListener('touchmove', e => {
            const y = e.touches[0].pageY;
            if (y - startY > 100 && window.scrollY === 0) {
                loadStatus();
            }
        });
    </script>
</body>
</html>
